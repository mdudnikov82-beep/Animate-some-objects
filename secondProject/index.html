<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        canvas { /* Стили для canvas */
            border: 1px dashed black;
        }
    </style>
    <title>Document</title>
</head>
<body>
    <div class="canvasContainer">
        <canvas id="canvas" width="1000" height="1000"></canvas>
    </div>
    <div>
        <button onClick="addBall()">Add Ball</button>
        <button onClick="clearBalls()">Clear Balls</button>
    </div>
    <div>
        The size of ball: <input type="number" id="ballSize" min="0" max="100" value="20"> maximum: 100
        <input type="checkbox" id="connectedBalls">Add connected balls
    </div>
    <script>
        let canvas = document.getElementById("canvas");
        let ctx = canvas.getContext("2d"); // Получаем контекст рисования


        let squarePosition = { x: 10, y: 0 };
        // function drawFrame() {
        //     // Очистить canvas
        //     ctx.clearRect(0, 0, canvas.width, canvas.height);
            
        //     // Начать рисование фигуры
        //     ctx.beginPath();

        //     // Нарисовать прямоугольник с линиями
        //     ctx.rect(squarePosition.x, squarePosition.y, 10, 10);
    
        //     ctx.strokeStyle = "#109bfc"; // Цвет линий
        //     ctx.lineWidth = 1; // Толщина линий
        //     ctx.stroke();
            
        //     // Обновляем позицию квадрата
        //     squarePosition.x += 2;
        //     squarePosition.y += 2;
            
        //     // Повторяем рисование через 20мс
        //     setTimeout(drawFrame, 20);
        // }
        
        function drawFrame() {
                // Очистить canvas
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Начать рисование фигуры
                ctx.beginPath();
                // Рисуем все шары из массива
                for (let i=0; i<balls.length; i++) {
                    let ball = balls[i]
                    ball.x += ball.dx
                    ball.y += ball.dy
                    // Формула для ускорения падения шара (ускорение свободного падения)
                    // Если шар находится в пределах canvas по оси Y, то увеличиваем скорость падения
                    if ((ball.y) < canvas.height) ball.dy += 0.22
                    // ball.dx *= 0.998
                    ball.x = ball.dx * 0.998
                    // Проверяем, не вышел ли шар за границы canvas по оси 
                    if ((ball.x + ball.radius > canvas.width) || (ball.x - ball.radius < 0)) {
                        ball.dx = -ball.dx;
                    }
                    // Проверяем, не вышел ли шар за границы canvas по оси Y
                    if ((ball.y + ball.radius > canvas.height) || (ball.y - ball.radius < 0)) {
                        ball.dy = -ball.dy*0.96
                    }
                    // Проверяем, отмечен ли чекбокс
                    // Если чекбокс не отмечен, используем fillColor шара, иначе используем белый цвет
                    if (!document.getElementById("connectedBalls").checked) {
                        // Если чекбокс не отмечен, используем fillColor шара
                        ctx.beginPath();
                        ctx.fillStyle = ball.fillColor;
                    } else {
                        // Если чекбокс отмечен, используем белый цвет
                        ctx.fillstyle = "white";
                    }
                }
                // Нарисовать круг с линиями
                ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
                ctx.lineWidth = 1; // Толщина линий
                ctx.fill()
                ctx.stroke();
                
                // Повторяем рисование через 20мс
                setTimeout(drawFrame, 20);
            }

        // Конструктор шара
        function Ball(x, y, dx, dy, radius) {
            this.x = x;
            this.y = y;
            this.dx = dx;
            this.dy = dy;
            this.radius = radius;
            this.strokeStyle = "black";
            this.fillColor = "red";
        }

        // Массив шаров
        let balls = []

        function AddBall() {
            // Получаем радиус из input
            let radius = parseFloat(document.getElementById("ballSize").value);
            
            // Создаем новый шар
            let ball = new Ball(100, 100, 1, 1, radius);

            // Добавляем шар в массив
            balls.push(ball);
        }

        function clearBalls() {
            balls = [];
        }        

        window.onload = function() {
            drawFrame();
        }
    </script>
</body>
</html>
